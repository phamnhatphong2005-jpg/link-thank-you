  <!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Thank You</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: linear-gradient(to bottom, #ffe6f0, #fff);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
}

/* Bao thư */
.envelope {
  width: 320px;
  height: 220px;
  background: #ff6699;
  position: relative;
  cursor: pointer;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.flap {
  width: 100%;
  height: 100%;
  background: #ff4d88;
  position: absolute;
  top: 0;
  left: 0;
  clip-path: polygon(0 0, 50% 50%, 100% 0);
  transform-origin: top;
  transition: 0.6s;
}

.open .flap {
  transform: rotateX(180deg);
}

/* Nội dung */
.message {
  display: none;
  text-align: center;
  padding: 20px;
  color: #d63384;
  animation: fadeIn 1s ease forwards;
}

.open .message {
  display: block;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

/* Hoa bay */
.flower {
  position: absolute;
  font-size: 20px;
  animation: fall linear infinite;
}

@keyframes fall {
  0% {transform: translateY(-10vh);}
  100% {transform: translateY(110vh);}
}
</style>
</head>
<body>

<div class="envelope" onclick="openEnvelope(this)">
  <div class="flap"></div>
  <div class="message">
    <h2>💌</h2>
    <h2>Cảm ơn bạn đã ủng hộ ❤️</h2>
    <p>Chúc bạn một ngày thật vui vẻ 🌸</p>
  </div>
</div>

<script>
function openEnvelope(el){
  el.classList.toggle("open");
}

/* Tạo hoa bay */
for(let i=0;i<25;i++){
  let flower = document.createElement("div");
  flower.className = "flower";
  flower.innerHTML = ["🌸","🌷","🌹","🌺","🌼"][Math.floor(Math.random()*5)];
  flower.style.left = Math.random()*100 + "vw";
  flower.style.animationDuration = (3 + Math.random()*5) + "s";
  flower.style.fontSize = (16 + Math.random()*20) + "px";
  document.body.appendChild(flower);
}
</script>

</body>
</html>
